version: '3.8'

services:
  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: multi-tenant-rabbitmq
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - multi-tenant-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # PostgreSQL for CatalogService
  catalogservice.db:
    image: postgres:15
    container_name: catalogservice-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: CatalogServiceDb
    ports:
      - "5433:5432"
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    networks:
      - multi-tenant-network

  # PostgreSQL for OrdersService
  ordersservice.db:
    image: postgres:15
    container_name: ordersservice-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: OrdersServiceDb
    ports:
      - "5434:5432"
    volumes:
      - orders_db_data:/var/lib/postgresql/data
    networks:
      - multi-tenant-network

  # PostgreSQL for IdentityService
  identityservice.db:
    image: postgres:15
    container_name: identityservice-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: IdentityServiceDb
    ports:
      - "5435:5432"
    volumes:
      - identity_db_data:/var/lib/postgresql/data
    networks:
      - multi-tenant-network

  # CatalogService API
  catalogservice.api:
    build:
      context: .
      dockerfile: CatalogService.Api/Dockerfile
    container_name: catalogservice-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=catalogservice.db;Port=5432;Database=CatalogServiceDb;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__VirtualHost=/
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - Jwt__Secret=your-super-secret-key-that-is-at-least-32-characters-long-for-HS256
      - Jwt__Issuer=YourAppIssuer
      - Jwt__Audience=YourAppAudience
    depends_on:
      - catalogservice.db
      - rabbitmq
    networks:
      - multi-tenant-network
    restart: unless-stopped

  # OrdersService API
  ordersservice.api:
    build:
      context: .
      dockerfile: OrdersService.Api/Dockerfile
    container_name: ordersservice-api
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=ordersservice.db;Port=5432;Database=OrdersServiceDb;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__VirtualHost=/
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - Services__CatalogService__Url=http://catalogservice.api:8080
      - Jwt__Secret=your-super-secret-key-that-is-at-least-32-characters-long-for-HS256
      - Jwt__Issuer=YourAppIssuer
      - Jwt__Audience=YourAppAudience
    depends_on:
      - ordersservice.db
      - rabbitmq
      - catalogservice.api
    networks:
      - multi-tenant-network
    restart: unless-stopped

  # IdentityService API
  identityservice.api:
    build:
      context: .
      dockerfile: IdentityService.Api/Dockerfile
    container_name: identityservice-api
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=identityservice.db;Port=5432;Database=IdentityServiceDb;Username=postgres;Password=postgres
      - Jwt__Secret=your-super-secret-key-that-is-at-least-32-characters-long-for-HS256
      - Jwt__Issuer=YourAppIssuer
      - Jwt__Audience=YourAppAudience
    depends_on:
      - identityservice.db
    networks:
      - multi-tenant-network
    restart: unless-stopped

volumes:
  rabbitmq_data:
  catalog_db_data:
  orders_db_data:
  identity_db_data:

networks:
  multi-tenant-network:
    driver: bridge

