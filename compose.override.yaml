version: '3.8'

# This file is automatically used by docker-compose alongside compose.yaml
# It provides development-specific overrides

services:
  catalog-service:
    volumes:
      # Enable hot reload during development (optional)
      - ./CatalogService.Api:/app/CatalogService.Api:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    
  identity-service:
    volumes:
      - ./IdentityService.Api:/app/IdentityService.Api:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    
  orders-service:
    volumes:
      - ./OrdersService.Api:/app/OrdersService.Api:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

