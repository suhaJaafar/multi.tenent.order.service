version: '3.8'

services:
  # ============================================
  # Databases
  # ============================================
  catalog-db:
    image: postgres:16-alpine
    container_name: catalog-db
    environment:
      POSTGRES_DB: CatalogServiceDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  identity-db:
    image: postgres:16-alpine
    container_name: identity-db
    environment:
      POSTGRES_DB: IdentityServiceDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  orders-db:
    image: postgres:16-alpine
    container_name: orders-db
    environment:
      POSTGRES_DB: OrdersServiceDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - orders-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Microservices
  # ============================================
  catalog-service:
    image: catalog-service:latest
    container_name: catalog-service
    build:
      context: .
      dockerfile: CatalogService.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=catalog-db;Port=5432;Database=CatalogServiceDb;Username=postgres;Password=postgres
      - Jwt__Secret=your-super-secret-key-that-is-at-least-32-characters-long-for-HS256
      - Jwt__Issuer=YourAppIssuer
      - Jwt__Audience=YourAppAudience
    ports:
      - "5001:8080"
    depends_on:
      catalog-db:
        condition: service_healthy
    networks:
      - microservices-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  identity-service:
    image: identity-service:latest
    container_name: identity-service
    build:
      context: .
      dockerfile: IdentityService.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=identity-db;Port=5432;Database=IdentityServiceDb;Username=postgres;Password=postgres
      - Jwt__Secret=your-super-secret-key-that-is-at-least-32-characters-long-for-HS256
      - Jwt__Issuer=YourAppIssuer
      - Jwt__Audience=YourAppAudience
    ports:
      - "5002:8080"
    depends_on:
      identity-db:
        condition: service_healthy
    networks:
      - microservices-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  orders-service:
    image: orders-service:latest
    container_name: orders-service
    build:
      context: .
      dockerfile: OrdersService.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=orders-db;Port=5432;Database=OrdersServiceDb;Username=postgres;Password=postgres
      - Jwt__Secret=your-super-secret-key-that-is-at-least-32-characters-long-for-HS256
      - Jwt__Issuer=YourAppIssuer
      - Jwt__Audience=YourAppAudience
    ports:
      - "5003:8080"
    depends_on:
      orders-db:
        condition: service_healthy
    networks:
      - microservices-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ============================================
# Networks
# ============================================
networks:
  microservices-network:
    driver: bridge
    name: microservices-network

# ============================================
# Volumes
# ============================================
volumes:
  catalog-db-data:
    name: catalog-db-data
  identity-db-data:
    name: identity-db-data
  orders-db-data:
    name: orders-db-data

